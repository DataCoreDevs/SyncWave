{% extends "base.html" %}

{% block content %}

<section class="home mood-page">

  <h1 class="page-title">
    Your Current Mood
  </h1>

  <div class="mood-center">

    <p id="current-mood">
      —
    </p>

    <div class="mood-buttons">

      <button
        id="analyze-btn"
        class="btn-primary">

        ANALYZE MOOD
      </button>

      <button
        id="change-mood-btn-page"
        class="btn-primary">

        CHANGE MOOD
      </button>

    </div>

  </div>

  <section class="recommendations">

    <h2>
      Recommended for You
    </h2>

    <ul
      id="mood-recommendations">

    </ul>

  </section>

</section>

<!-- MOOD ANALYZE POPUP -->
<div
  id="mood-popup"
  class="mood-popup hidden">

  <div
    class="popup-card">

    <h2>
      YOUR MOOD IS
    </h2>

    <h1
      id="popup-mood">

    </h1>

    <button
      id="close-popup"
      class="btn-primary">

      AWESOME 🔥
    </button>

  </div>

</div>

<script>

document.addEventListener(
  "DOMContentLoaded",
  () => {

    /* ===========================
       ELEMENTS
    =========================== */

    const analyzeBtn =
      document.getElementById(
        "analyze-btn"
      );

    const popup =
      document.getElementById(
        "mood-popup"
      );

    const popupMood =
      document.getElementById(
        "popup-mood"
      );

    const closePopup =
      document.getElementById(
        "close-popup"
      );

    const moodText =
      document.getElementById(
        "current-mood"
      );

    /* ===========================
       RECOMMENDATIONS
    =========================== */

    async function
    renderRecommendations(
      mood
    ) {

      const list =
        document.getElementById(
          "mood-recommendations"
        );

      if (
        !list
      ) return;

      list.innerHTML =
        "";

      try {

        const response =
          await fetch(

            `/recommendations/${mood}`

          );

        const songs =
          await response
            .json();

        songs.forEach(
          song => {

            const li =
              document.createElement(
                "li"
              );

            li.className =
              "recommendation-card";

            li.innerHTML = `

              <strong>
                🎵
                ${song.track_name}
              </strong>

              <br>

              <span>
                ${song.artist}
              </span>

            `;

            list.appendChild(
              li
            );

          }
        );

      }

      catch (
        error
      ) {

        console.error(
          error
        );

      }

    }

    /* ===========================
       LOAD CURRENT MOOD
    =========================== */

    if (
      moodText
    ) {

      const currentMood =
        localStorage.getItem(
          "currentMood"
        ) ||
        "Chill";

      moodText.textContent =
        currentMood;

      renderRecommendations(
        currentMood
      );

    }

    /* ===========================
       ANALYZE MOOD
    =========================== */

    if (
      analyzeBtn
    ) {

      analyzeBtn
        .addEventListener(
          "click",
          async () => {

            const recentSongs =
              JSON.parse(
                sessionStorage.getItem(
                  "recentSongs"
                )
              ) || [];

            const last5 =
              recentSongs
              .slice(
                0,
                5
              )
              .map(
                song =>
                  song.name
              );

            if (
              last5.length === 0
            ) {

              alert(
                "Play at least one song first 🎧"
              );

              return;
            }

            try {

              const response =
                await fetch(

                  "/analyze-mood",

                  {

                    method:
                      "POST",

                    headers:
                      {

                        "Content-Type":
                          "application/json"

                      },

                    body:
                      JSON.stringify({

                        songs:
                          last5

                      })

                  }

                );

              const data =
                await response
                  .json();

              const mood =
                data.mood;

              // update mood
              moodText
                .textContent =
                mood;

              localStorage
                .setItem(

                  "currentMood",

                  mood

                );

              // update recommendations
              renderRecommendations(
                mood
              );

              // save history
              let history =
                JSON.parse(
                  localStorage.getItem(
                    "moodHistory"
                  )
                ) || [];

              const date =
                new Date();

              const day =
                date.getDate();

              const month =
                date.toLocaleString(
                  "default",
                  {
                    month:
                      "long"
                  }
                );

              function
              getOrdinal(
                n
              ) {

                if (
                  n > 3 &&
                  n < 21
                ) return "th";

                switch (
                  n % 10
                ) {

                  case 1:
                    return "st";

                  case 2:
                    return "nd";

                  case 3:
                    return "rd";

                  default:
                    return "th";

                }

              }

              const today =
                `${day}${getOrdinal(
                  day
                )} ${month}`;

              history.push({

                date:
                  today,

                mood:
                  mood

              });

              history =
                history.slice(
                  -14
                );

              localStorage
                .setItem(

                  "moodHistory",

                  JSON.stringify(
                    history
                  )

                );

              // popup
              popupMood
                .textContent =
                mood;

              popup
                .classList
                .remove(
                  "hidden"
                );

            }

            catch (
              error
            ) {

              console.error(
                error
              );

              alert(
                "Mood analysis failed 😭"
              );

            }

          }
        );

    }

    /* ===========================
       CLOSE POPUP
    =========================== */

    if (
      closePopup
    ) {

      closePopup
        .addEventListener(
          "click",
          () => {

            popup
              .classList
              .add(
                "hidden"
              );

          }
        );

    }

  }
);

</script>

{% endblock %}
